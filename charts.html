<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reziot Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {

            font-family:
                'Segoe UI',
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #eef2f7,
                    #dbe7f1
                );

            margin: 0;

            padding: 30px;

            text-align: center;
        }

        h1 {

            color: #2c3e50;

            margin-bottom: 40px;

            font-size: 2.5rem;
        }

        .chart-container {

            background: white;

            border-radius: 24px;

            padding: 25px;

            margin: 30px auto;

            max-width: 1100px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);
        }

        h2 {

            color: #2c3e50;

            margin-bottom: 20px;

            font-size: 1.3rem;
        }

        canvas {

            width: 100% !important;

            height: 300px !important;
        }

        .back-btn {

            display: inline-block;

            margin-top: 30px;

            padding: 14px 28px;

            border-radius: 12px;

            background: #2c3e50;

            color: white;

            text-decoration: none;

            font-weight: bold;

            transition: 0.2s;
        }

        .back-btn:hover {

            background: #34495e;

            transform: translateY(-2px);
        }

    </style>

</head>

<body>

    <h1>
        📈 Reziot Weather Analytics
    </h1>

    <!-- TEMPERATURE -->

    <div class="chart-container">

        <h2>
            🌡️ Temperature
        </h2>

        <canvas id="tempChart"></canvas>

    </div>

    <!-- HUMIDITY -->

    <div class="chart-container">

        <h2>
            💧 Humidity
        </h2>

        <canvas id="humChart"></canvas>

    </div>

    <!-- PRESSURE -->

    <div class="chart-container">

        <h2>
            🌬️ Pressure
        </h2>

        <canvas id="pressChart"></canvas>

    </div>

    <a href="./index.html"
       class="back-btn">

        ← Back to Dashboard

    </a>

    <script>

        // =====================================================
        // API URL
        // =====================================================

        const apiUrl =
            "https://bms-api.reziot.xyz/history";

        // =====================================================
        // LOAD CHARTS
        // =====================================================

        async function loadCharts() {

            try {

                const response =
                    await fetch(apiUrl);

                const data =
                    await response.json();

                // =====================================================
                // ORDER
                // =====================================================

                data.reverse();

                // =====================================================
                // FINLAND LOCAL TIME
                // =====================================================

                const labels =

                    data.map(item => {

                        const localDate =

                            new Date(

                                item.created_at
                                    .replace(
                                        " ",
                                        "T"
                                    ) + "Z"
                            );

                        return localDate
                            .toLocaleTimeString(
                                "fi-FI",
                                {
                                    hour: '2-digit',
                                    minute: '2-digit'
                                }
                            );
                    });

                // =====================================================
                // DATASETS
                // =====================================================

                const temperatures =
                    data.map(item =>
                        item.temperature
                    );

                const humidities =
                    data.map(item =>
                        item.humidity
                    );

                const pressures =
                    data.map(item =>
                        item.pressure
                    );

                // =====================================================
                // COMMON OPTIONS
                // =====================================================

                const commonOptions = {

                    responsive: true,

                    maintainAspectRatio: false,

                    plugins: {

                        legend: {

                            labels: {

                                font: {

                                    size: 13
                                }
                            }
                        }
                    },

                    scales: {

                        x: {

                            ticks: {

                                font: {

                                    size: 10
                                },

                                maxTicksLimit: 8
                            }
                        }
                    }
                };

                // =====================================================
                // TEMPERATURE CHART
                // =====================================================

                new Chart(

                    document.getElementById(
                        'tempChart'
                    ),

                    {

                        type: 'line',

                        data: {

                            labels: labels,

                            datasets: [

                                {

                                    label:
                                        'Temperature °C',

                                    data:
                                        temperatures,

                                    borderColor:
                                        '#2ecc71',

                                    backgroundColor:
                                        'rgba(46,204,113,0.08)',

                                    tension: 0.35,

                                    fill: true,

                                    pointRadius: 2,

                                    pointHoverRadius: 4,

                                    borderWidth: 2
                                }
                            ]
                        },

                        options: {

                            ...commonOptions,

                            scales: {

                                ...commonOptions.scales,

                                y: {

                                    min: 10,

                                    max: 40,

                                    ticks: {

                                        font: {

                                            size: 11
                                        }
                                    }
                                }
                            }
                        }
                    }
                );

                // =====================================================
                // HUMIDITY CHART
                // =====================================================

                new Chart(

                    document.getElementById(
                        'humChart'
                    ),

                    {

                        type: 'line',

                        data: {

                            labels: labels,

                            datasets: [

                                {

                                    label:
                                        'Humidity %',

                                    data:
                                        humidities,

                                    borderColor:
                                        '#3498db',

                                    backgroundColor:
                                        'rgba(52,152,219,0.08)',

                                    tension: 0.35,

                                    fill: true,

                                    pointRadius: 2,

                                    pointHoverRadius: 4,

                                    borderWidth: 2
                                }
                            ]
                        },

                        options: {

                            ...commonOptions,

                            scales: {

                                ...commonOptions.scales,

                                y: {

                                    min: 10,

                                    max: 80,

                                    ticks: {

                                        font: {

                                            size: 11
                                        }
                                    }
                                }
                            }
                        }
                    }
                );

                // =====================================================
                // PRESSURE CHART
                // =====================================================

                new Chart(

                    document.getElementById(
                        'pressChart'
                    ),

                    {

                        type: 'line',

                        data: {

                            labels: labels,

                            datasets: [

                                {

                                    label:
                                        'Pressure hPa',

                                    data:
                                        pressures,

                                    borderColor:
                                        '#e67e22',

                                    backgroundColor:
                                        'rgba(230,126,34,0.08)',

                                    tension: 0.35,

                                    fill: true,

                                    pointRadius: 2,

                                    pointHoverRadius: 4,

                                    borderWidth: 2
                                }
                            ]
                        },

                        options: {

                            ...commonOptions,

                            scales: {

                                ...commonOptions.scales,

                                y: {

                                    min: 1000,

                                    max: 1025,

                                    ticks: {

                                        font: {

                                            size: 11
                                        }
                                    }
                                }
                            }
                        }
                    }
                );
            }

            catch(error) {

                console.error(error);

                alert(
                    "Failed to load chart data"
                );
            }
        }

        // =====================================================
        // START
        // =====================================================

        loadCharts();

    </script>

</body>

</html>

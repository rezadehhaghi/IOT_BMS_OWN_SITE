<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reziot Home Layout</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(
                135deg,
                #eef2f7,
                #dbe7f1
            );
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .main-title {
            text-align: center;
            font-size: 2.5rem;
            color: #1f2937;
            margin: 0;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin: 10px 0 25px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #102a43;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .layout-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .wall {
            fill: none;
            stroke: #0f172a;
            stroke-width: 12;
        }

        .room {
            fill: #f8fafc;
        }

        .active-room {
            fill: #dff5da;
        }

        .label {
            fill: #111827;
            text-anchor: middle;
            font-family: 'Segoe UI', sans-serif;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .footer {
            text-align: center;
            color: #64748b;
            margin-top: 25px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="main-title">
            🏠 Home Layout
        </h1>

        <p class="subtitle">
            Apartment Environmental Monitoring
        </p>

        <a href="./index.html"
           class="back-btn">

            ← Dashboard

        </a>

        <div class="layout-card">

            <svg viewBox="0 0 1000 1200">

                <!-- ROOMS -->

                <!-- Bedroom -->

                <rect x="80"
                      y="300"
                      width="340"
                      height="470"
                      class="room" />

                <!-- Balcony -->

                <rect x="80"
                      y="790"
                      width="340"
                      height="250"
                      class="room" />

                <!-- Bathroom -->

                <rect x="360"
                      y="80"
                      width="320"
                      height="180"
                      class="room" />

                <!-- Entrance -->

                <rect x="680"
                      y="80"
                      width="240"
                      height="240"
                      class="room" />

                <!-- Living Room -->

                <polygon points="
                    420,260
                    920,260
                    920,1000
                    420,1000
                    420,520
                    460,520
                    460,260"
                    class="active-room" />

                <!-- Kitchen -->

                <polygon points="
                    420,260
                    700,260
                    700,520
                    420,520"
                    class="room" />

                <!-- WALLS -->

                <path class="wall"
                      d="
                      M80 300
                      L80 1040
                      L420 1040
                      L420 1000

                      M420 1000
                      L920 1000
                      L920 80

                      M920 80
                      L360 80
                      L360 260

                      M360 260
                      L80 260
                      L80 300

                      M680 80
                      L680 320

                      M420 260
                      L420 700

                      M420 260
                      L700 260

                      M420 520
                      L700 520
                      " />

                <!-- LABELS -->

                <text x="520"
                      y="180"
                      class="label"
                      style="font-size:30px;font-weight:600;">
                    Bathroom
                </text>

                <text x="800"
                      y="200"
                      class="label"
                      style="font-size:30px;font-weight:600;">
                    Entrance
                </text>

                <text x="560"
                      y="410"
                      class="label"
                      style="font-size:30px;font-weight:600;">
                    Kitchen
                </text>

                <text x="250"
                      y="570"
                      class="label"
                      style="font-size:36px;font-weight:600;">
                    Bedroom
                </text>

                <text x="250"
                      y="920"
                      class="label"
                      style="font-size:36px;font-weight:600;">
                    Balcony
                </text>

                <text x="670"
                      y="600"
                      class="label"
                      style="font-size:38px;font-weight:600;">
                    Living Room
                </text>

                <text id="livingTemp"
                      x="670"
                      y="720"
                      class="label"
                      style="font-size:92px;font-weight:700;">
                    --
                </text>

                <text id="livingHum"
                      x="670"
                      y="810"
                      class="label"
                      style="font-size:42px;">
                    --
                </text>

            </svg>

            <div class="legend">

                <div class="legend-item">

                    <div class="dot"
                         style="background:#dff5da;">
                    </div>

                    Sensor Online

                </div>

                <div class="legend-item">

                    <div class="dot"
                         style="background:#f8fafc;border:1px solid #cbd5e1;">
                    </div>

                    No Sensor Installed

                </div>

            </div>

        </div>

        <div class="footer">
            © 2025 Reziot BMS. All rights reserved.
        </div>

    </div>

    <script>

        const apiUrl =
            "https://bms-api.reziot.xyz/latest";

        async function loadData() {

            try {

                const response =
                    await fetch(apiUrl);

                const data =
                    await response.json();

                document.getElementById(
                    "livingTemp"
                ).textContent =
                    Number(
                        data.temperature
                    ).toFixed(1) + "°C";

                document.getElementById(
                    "livingHum"
                ).textContent =
                    Number(
                        data.humidity
                    ).toFixed(1) + "% RH";

            }

            catch(error) {

                console.error(error);

                document.getElementById(
                    "livingTemp"
                ).textContent =
                    "--°C";

                document.getElementById(
                    "livingHum"
                ).textContent =
                    "--% RH";
            }
        }

        loadData();

        setInterval(
            loadData,
            15000
        );

    </script>

</body>

</html>

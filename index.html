<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Live Sensor Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 50px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: inline-block;
            min-width: 280px;
            border-top: 5px solid #2ecc71;
            margin: 10px;
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.5rem;
        }

        .value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2ecc71;
            margin: 20px 0;
        }

        .status {
            font-size: 0.85rem;
            color: #7f8c8d;
            background: #edeae680;
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .graph-btn {
            display: inline-block;
            text-decoration: none;
            margin: 30px auto 0 auto;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #2c3e50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .graph-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

    <!-- Temperature -->
    <div class="card">
        <h2>Temperature</h2>

        <div class="value" id="sensor-data">
            Loading...
        </div>

        <div class="status" id="timestamp">
            Connecting to server...
        </div>
    </div>

    <!-- Humidity -->
    <div class="card" style="border-top: 5px solid #3498db;">
        <h2>Humidity</h2>

        <div class="value"
             id="humidity-data"
             style="color: #3498db;">
            Loading...
        </div>

        <div class="status" id="humidity-timestamp">
            Connecting to server...
        </div>
    </div>

    <!-- Pressure -->
    <div class="card" style="border-top: 5px solid #e67e22;">
        <h2>Pressure</h2>

        <div class="value"
             id="pressure-data"
             style="color: #e67e22;">
            Loading...
        </div>

        <div class="status" id="pressure-timestamp">
            Connecting to server...
        </div>
    </div>

    <!-- Charts Button -->
    <div>
        <a href="./Bars/" class="graph-btn">
            Charts
        </a>
    </div>

    <script>

        // ThingSpeak JSON feed URL
        const straightforwardUrl =
            "https://api.thingspeak.com/channels/3386022/feeds.json?results=2";

        async function getLiveValue() {

            try {

                const response = await fetch(straightforwardUrl);

                const data = await response.json();

                const feeds = data.feeds;

                const latestFeed = feeds[feeds.length - 1];

                // Format time
                const rawTime = new Date(latestFeed.created_at);

                const formattedTime =
                    rawTime.toLocaleTimeString();

                // =====================================================
                // Temperature (Field 1)
                // =====================================================

                const sensorValue = latestFeed.field1;

                if (sensorValue !== null &&
                    sensorValue !== undefined) {

                    document.getElementById(
                        'sensor-data'
                    ).innerText = sensorValue + " °C";

                } else {

                    document.getElementById(
                        'sensor-data'
                    ).innerText = "--";
                }

                document.getElementById(
                    'timestamp'
                ).innerText =
                    `Last updated at: ${formattedTime}`;

                // =====================================================
                // Humidity (Field 2)
                // =====================================================

                const humidityValue = latestFeed.field2;

                if (humidityValue !== null &&
                    humidityValue !== undefined) {

                    document.getElementById(
                        'humidity-data'
                    ).innerText = humidityValue + " %";

                } else {

                    document.getElementById(
                        'humidity-data'
                    ).innerText = "--";
                }

                document.getElementById(
                    'humidity-timestamp'
                ).innerText =
                    `Last updated at: ${formattedTime}`;

                // =====================================================
                // Pressure (Field 3)
                // =====================================================

                const pressureValue = latestFeed.field3;

                if (pressureValue !== null &&
                    pressureValue !== undefined) {

                    document.getElementById(
                        'pressure-data'
                    ).innerText = pressureValue + " hPa";

                } else {

                    document.getElementById(
                        'pressure-data'
                    ).innerText = "--";
                }

                document.getElementById(
                    'pressure-timestamp'
                ).innerText =
                    `Last updated at: ${formattedTime}`;

            }

            catch (error) {

                console.error("Error:", error);

                document.getElementById(
                    'sensor-data'
                ).innerText = "--";

                document.getElementById(
                    'timestamp'
                ).innerText = "Connection Error";

                document.getElementById(
                    'humidity-data'
                ).innerText = "--";

                document.getElementById(
                    'humidity-timestamp'
                ).innerText = "Connection Error";

                document.getElementById(
                    'pressure-data'
                ).innerText = "--";

                document.getElementById(
                    'pressure-timestamp'
                ).innerText = "Connection Error";
            }
        }

        // Initial fetch
        getLiveValue();

        // Refresh every 15 seconds
        setInterval(getLiveValue, 15000);

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ======================================
         PAGE META DATA
    ====================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">
    <meta
        name="theme-color"
        content="#0f172a">

    <title>⚙️ Reziot Settings</title>

    <!-- ======================================
         PAGE STYLE
    ====================================== -->


<style>


/* Disable pull-to-refresh */
html,
body {
    overscroll-behavior: none;
}

/* Disable double-tap zoom */
* {
    touch-action: manipulation;
}


/* ======================================
   GLOBAL STYLE
====================================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* ======================================
   MAIN CARD
====================================== */

.container {
    width: 100%;
    max-width: 750px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,0.1);

    border-radius: 24px;

    padding: 30px;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.3);
}

h1 {
    color: white;
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #cbd5e1;
    margin-bottom: 30px;
}

/* ======================================
   SETTINGS CARDS
====================================== */

.card {
    background: rgba(255,255,255,0.05);

    border-radius: 18px;

    padding: 20px;
    margin-bottom: 20px;
}

.card h2 {
    color: white;
    margin-bottom: 20px;
    font-size: 18px;
}

.setting {
    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-bottom: 15px;
    gap: 20px;
}

.setting label {
    color: white;
    font-weight: 600;
}

.setting small {
    display: block;
    color: #94a3b8;
    margin-top: 4px;
}

input[type="number"] {
    width: 140px;

    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.15);

    color: white;

    padding: 10px;

    border-radius: 10px;
}

input[type="checkbox"] {
    transform: scale(1.4);
}

/* ======================================
   SAVE BUTTON
====================================== */

#saveBtn {

    width: 100%;

    border: none;

    border-radius: 14px;

    padding: 16px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    color: white;

    background: linear-gradient(
        135deg,
        #06b6d4,
        #3b82f6
    );
}

#saveBtn:hover {
    opacity: 0.9;
}

#status {
    text-align: center;
    margin-top: 15px;
    color: #22c55e;
    font-weight: bold;
}

</style>

</head>

<body>

<!-- ======================================
     MAIN CONTAINER
====================================== -->

<div class="container">

    <h1>⚙️ REZIOT SETTINGS</h1>

    <div class="subtitle">
        Alert Configuration
    </div>

    <!-- ======================================
         TELEGRAM SETTINGS
    ====================================== -->

    <div class="card">

        <h2>📢 Telegram Alerts</h2>

        <div class="setting">

            <div>
                <label>Telegram Alerts</label>
                <small>Enable Telegram notifications</small>
            </div>

            <input
                type="checkbox"
                id="telegramEnabled">

        </div>

        <div class="setting">

            <div>
                <label>Offline Minutes</label>
                <small>Allowed range: 1 - 1440</small>
            </div>

            <input
                type="number"
                id="offlineMinutes"
                min="1"
                max="1440">

        </div>

    </div>

    <!-- ======================================
         TEMPERATURE SETTINGS
    ====================================== -->

    <div class="card">

        <h2>🌡 Temperature Alerts</h2>

        <div class="setting">

            <div>
                <label>Temperature Alert Enabled</label>
            </div>

            <input
                type="checkbox"
                id="tempAlertEnabled">

        </div>

        <div class="setting">

            <div>
                <label>Temperature Threshold</label>
                <small>Allowed range: 0°C - 80°C</small>
            </div>

            <input
                type="number"
                id="tempThreshold"
                min="0"
                max="80">

        </div>

    </div>

    <!-- ======================================
         HUMIDITY SETTINGS
    ====================================== -->

    <div class="card">

        <h2>💧 Humidity Alerts</h2>

        <div class="setting">

            <div>
                <label>Humidity Alert Enabled</label>
            </div>

            <input
                type="checkbox"
                id="humidityAlertEnabled">

        </div>

        <div class="setting">

            <div>
                <label>Humidity Threshold</label>
                <small>Allowed range: 0% - 100%</small>
            </div>

            <input
                type="number"
                id="humidityThreshold"
                min="0"
                max="100">

        </div>

    </div>

    <!-- ======================================
         SAVE BUTTON
    ====================================== -->

    <button id="saveBtn">
        Save Settings
    </button>

    <div id="status"></div>

</div>

<!-- ======================================
     JAVASCRIPT
====================================== -->

<script>

// ======================================
// LOAD SETTINGS FROM API
// ======================================

async function loadSettings() {

    const response = await fetch(
        "https://bms-api.reziot.xyz/settings"
    );

    const settings = await response.json();

    document.getElementById("telegramEnabled").checked =
        settings.telegram_enabled === "true";

    document.getElementById("offlineMinutes").value =
        settings.offline_minutes;

    document.getElementById("tempAlertEnabled").checked =
        settings.temp_alert_enabled === "true";

    document.getElementById("tempThreshold").value =
        settings.temp_threshold;

    document.getElementById("humidityAlertEnabled").checked =
        settings.humidity_alert_enabled === "true";

    document.getElementById("humidityThreshold").value =
        settings.humidity_threshold;
}

loadSettings();

// ======================================
// END LOAD SETTINGS
// ======================================

// ======================================
// SAVE SETTINGS BUTTON
// ======================================

document
  .getElementById("saveBtn")
  .addEventListener(
    "click",
    async () => {

      const token =
        localStorage.getItem(
          "token"
        );

      if (!token) {

        alert(
          "Please login first"
        );

        return;

      }

      const settings = {

        telegram_enabled:
          document.getElementById(
            "telegramEnabled"
          ).checked,

        offline_minutes:
          Number(
            document.getElementById(
              "offlineMinutes"
            ).value
          ),

        temp_threshold:
          Number(
            document.getElementById(
              "tempThreshold"
            ).value
          ),

        humidity_threshold:
          Number(
            document.getElementById(
              "humidityThreshold"
            ).value
          )

      };

      const response =
        await fetch(
          "https://bms-api.reziot.xyz/settings",
          {
            method: "POST",

            headers: {

              "Content-Type":
                "application/json",

              "Authorization":
                `Bearer ${token}`

            },

            body:
              JSON.stringify(
                settings
              )
          }
        );

      const result =
        await response.json();

      if (result.success) {

        document.getElementById(
          "status"
        ).textContent =
          "✅ Settings saved";

      }

      else {

        document.getElementById(
          "status"
        ).textContent =
          "❌ " +
          result.message;

      }

    }
  );

// ======================================
// END SAVE SETTINGS BUTTON
// ======================================

</script>

</body>
</html>

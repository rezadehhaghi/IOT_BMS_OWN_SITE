<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Reziot Weather</title>

<style>

body {

    margin:0;

    background:#eef2f7;

    font-family:
        Segoe UI,
        sans-serif;

}

.container {

    max-width:500px;

    margin:auto;

    padding:12px;

}

.header {

    display:flex;

    align-items:center;

    gap:15px;

    font-size:1.2rem;

    font-weight:700;

    margin-bottom:10px;

}

.header a {

    text-decoration:none;

    color:#2c3e50;

}

.main-card {

    background:white;

    border-radius:24px;

    padding:20px;

    text-align:center;

    margin-bottom:10px;

    box-shadow:
        0 4px 15px rgba(0,0,0,.08);

}

#weatherIcon {

    font-size:4rem;

}

#temp {

    font-size:4rem;

    font-weight:bold;

    color:#f39c12;

}

#description {

    font-size:1.1rem;

    color:#666;

}

.location {

    margin-top:6px;

    color:#777;

}

.info-grid {

    display:grid;

    grid-template-columns:
        1fr 1fr;

    gap:6px;

}

.info-box {

    background:white;

    border-radius:12px;

    padding:8px;

    text-align:center;

    box-shadow:
        0 2px 6px rgba(0,0,0,.06);

}

.info-box span {

    display:block;

    color:#888;

    font-size:.7rem;

}

.info-box strong {

    display:block;

    margin-top:2px;

    font-size:.9rem;

    color:#2c3e50;

}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <a href="./index.html">
            ←
        </a>

        <span>
            Weather
        </span>

    </div>

    <div class="main-card">

        <div id="weatherIcon">
            ☀️
        </div>

        <div id="temp">
            --°C
        </div>

        <div id="description">
            Loading...
        </div>

        <div class="location">

            <span id="city">
                --
            </span>,

            <span id="country">
                --
            </span>

        </div>

    </div>

    <div class="info-grid">

        <div class="info-box">
            <span>Feels Like</span>
            <strong id="feelsLike">--</strong>
        </div>

        <div class="info-box">
            <span>Humidity</span>
            <strong id="humidity">--</strong>
        </div>

        <div class="info-box">
            <span>Pressure</span>
            <strong id="pressure">--</strong>
        </div>

        <div class="info-box">
            <span>Visibility</span>
            <strong id="visibility">--</strong>
        </div>

        <div class="info-box">
            <span>Wind</span>
            <strong id="windSpeed">--</strong>
        </div>

        <div class="info-box">
            <span>Clouds</span>
            <strong id="clouds">--</strong>
        </div>

        <div class="info-box">
            <span>Rain</span>
            <strong id="rain1h">--</strong>
        </div>

        <div class="info-box">
            <span>Sunrise</span>
            <strong id="sunrise">--</strong>
        </div>

        <div class="info-box">
            <span>Sunset</span>
            <strong id="sunset">--</strong>
        </div>

        <div class="info-box">
            <span>Updated</span>
            <strong id="updated">--</strong>
        </div>

    </div>

</div>

<script>

navigator.geolocation.getCurrentPosition(

    position => {

        loadWeather(

            position.coords.latitude,

            position.coords.longitude

        );

    },

    () => {

showLocationError();

    }

);




function showLocationError() {

    document
    .getElementById(
        "weatherIcon"
    )
    .textContent =
        "📍";

    document
    .getElementById(
        "temp"
    )
    .textContent =
        "--";

    document
    .getElementById(
        "description"
    )
    .textContent =

        "Location access required";

    document
    .getElementById(
        "city"
    )
    .textContent =

        "Enable location";

    document
    .getElementById(
        "country"
    )
    .textContent =

        "";

}



async function loadWeather(
    lat,
    lon
) {

    try {

        const response =
            await fetch(

`https://bms-api.reziot.xyz/weather?lat=${lat}&lon=${lon}`

            );

        const data =
            await response.json();



if (

    !data ||

    !data.coord ||

    !data.name

) {

    showLocationError();

    return;

}




        const weatherMain =
            data.weather[0].main;

        let icon = "☀️";

        if (weatherMain === "Clouds") {

            icon = "☁️";

        }
        else if (weatherMain === "Rain") {

            icon = "🌧️";

        }
        else if (weatherMain === "Drizzle") {

            icon = "🌦️";

        }
        else if (weatherMain === "Thunderstorm") {

            icon = "⛈️";

        }
        else if (weatherMain === "Snow") {

            icon = "❄️";

        }
        else if (
            weatherMain === "Mist" ||
            weatherMain === "Fog"
        ) {

            icon = "🌫️";

        }

        document.getElementById(
            "weatherIcon"
        ).textContent =
            icon;

        document.getElementById(
            "temp"
        ).textContent =
            Math.round(
                data.main.temp
            ) + "°C";

        document.getElementById(
            "description"
        ).textContent =
            data.weather[0]
            .description;

        document.getElementById(
            "city"
        ).textContent =
            data.name;

        document.getElementById(
            "country"
        ).textContent =
            data.sys.country;

        document.getElementById(
            "feelsLike"
        ).textContent =
            Math.round(
                data.main.feels_like
            ) + "°C";

        document.getElementById(
            "humidity"
        ).textContent =
            data.main.humidity +
            "%";

        document.getElementById(
            "pressure"
        ).textContent =
            data.main.pressure +
            " hPa";

        document.getElementById(
            "visibility"
        ).textContent =
            (
                data.visibility /
                1000
            ).toFixed(1) +
            " km";

        document.getElementById(
            "windSpeed"
        ).textContent =
            data.wind.speed +
            " m/s";

        document.getElementById(
            "clouds"
        ).textContent =
            data.clouds.all +
            "%";

        document.getElementById(
            "rain1h"
        ).textContent =
            data.rain?.["1h"]
            ? data.rain["1h"] +
              " mm"
            : "0 mm";

        document.getElementById(
            "sunrise"
        ).textContent =
            new Date(
                data.sys.sunrise *
                1000
            ).toLocaleTimeString(
                "fi-FI",
                {
                    hour:"2-digit",
                    minute:"2-digit"
                }
            );

        document.getElementById(
            "sunset"
        ).textContent =
            new Date(
                data.sys.sunset *
                1000
            ).toLocaleTimeString(
                "fi-FI",
                {
                    hour:"2-digit",
                    minute:"2-digit"
                }
            );

        document.getElementById(
            "updated"
        ).textContent =
            new Date(
                data.dt *
                1000
            ).toLocaleTimeString(
                "fi-FI",
                {
                    hour:"2-digit",
                    minute:"2-digit"
                }
            );

    }

catch(error) {

    console.error(
        error
    );

    showLocationError();

}

}

setInterval(

    () => {

navigator.geolocation.getCurrentPosition(

    position => {

        loadWeather(

            position.coords.latitude,

            position.coords.longitude

        );

    },

    () => {

        showLocationError();

    }

);

    600000

);

document.addEventListener( "visibilitychange", () => { if ( !document.hidden ) { loadData(); loadWeather(); } } );

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

          content="width=device-width, initial-scale=1.0">

    <title>Reziot Home Layout</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(
                135deg,
                #eef2f7,
                #dbe7f1
            );
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .main-title {
            text-align: center;
            font-size: 2.5rem;
            color: #1f2937;
            margin: 0;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin: 10px 0 25px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #102a43;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .layout-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .wall {
            fill: none;
            stroke: #0f172a;
            stroke-width: 8;
        }

        .room {
            fill: #f8fafc;
        }

        .active-room {
            fill: #dff5da;
        }

        .label {
            fill: #111827;
            text-anchor: middle;
            font-family: 'Segoe UI', sans-serif;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .footer {
            text-align: center;
            color: #64748b;
            margin-top: 25px;
        }

    </style>

</head>

    <script>

        const apiUrl =
            "https://bms-api.reziot.xyz/latest";
		
		const rooms = {

    livingRoom: {
        temp: null,
        hum: null,
        simulated: false
    },

    kitchen: {
        temp: 25.8,
        hum: 42,
        simulated: true
    },

    bedroom: {
        temp: 23.4,
        hum: 47,
        simulated: true
    },

    bathroom: {
        temp: 26.7,
        hum: 61,
        simulated: true
    },

    balcony: {
        temp: 18.2,
        hum: 72,
        simulated: true
    }

};
		

function updateVirtualRooms() {

    const t =
        rooms.livingRoom.temp;

    const h =
        rooms.livingRoom.hum;

    rooms.kitchen.temp =
        t + (Math.random() * 0.6);

    rooms.kitchen.hum =
        h - 2 + (Math.random() * 3);

    rooms.bedroom.temp =
        t - 1 + (Math.random() * 0.5);

    rooms.bedroom.hum =
        h + 2 + (Math.random() * 4);

    rooms.bathroom.temp =
        t + 1.5 + (Math.random() * 0.5);

    rooms.bathroom.hum =
        h + 12 + (Math.random() * 8);

    rooms.balcony.temp =
        t - 13 + (Math.random() * 2);

    rooms.balcony.hum =
        h + 20 + (Math.random() * 10);
}

		function renderRooms() {

    document.getElementById("kitchenTemp")
        .textContent =
        rooms.kitchen.temp.toFixed(1) + "°C";

    document.getElementById("kitchenHum")
        .textContent =
        rooms.kitchen.hum.toFixed(1) + "% RH";

    document.getElementById("bedroomTemp")
        .textContent =
        rooms.bedroom.temp.toFixed(1) + "°C";

    document.getElementById("bedroomHum")
        .textContent =
        rooms.bedroom.hum.toFixed(1) + "% RH";

    document.getElementById("bathroomTemp")
        .textContent =
        rooms.bathroom.temp.toFixed(1) + "°C";

    document.getElementById("bathroomHum")
        .textContent =
        rooms.bathroom.hum.toFixed(1) + "% RH";

    document.getElementById("balconyTemp")
        .textContent =
        rooms.balcony.temp.toFixed(1) + "°C";

    document.getElementById("balconyHum")
        .textContent =
        rooms.balcony.hum.toFixed(1) + "% RH";

}
function updateSimulationFlags() {

    document.getElementById(
        "kitchenFlag"
    ).style.display =
        rooms.kitchen.simulated
            ? "block"
            : "none";

    document.getElementById(
        "bedroomFlag"
    ).style.display =
        rooms.bedroom.simulated
            ? "block"
            : "none";

    document.getElementById(
        "bathroomFlag"
    ).style.display =
        rooms.bathroom.simulated
            ? "block"
            : "none";

    document.getElementById(
        "balconyFlag"
    ).style.display =
        rooms.balcony.simulated
            ? "block"
            : "none";
}


async function loadData() {

    try {

        const response =
            await fetch(apiUrl);

        const data =
            await response.json();

        rooms.livingRoom.temp =
            Number(data.temperature);

        rooms.livingRoom.hum =
            Number(data.humidity);

        document.getElementById(
            "livingTemp"
        ).textContent =
            rooms.livingRoom.temp.toFixed(1) + "°C";

        document.getElementById(
            "livingHum"
        ).textContent =
            rooms.livingRoom.hum.toFixed(1) + "% RH";

        updateVirtualRooms();

        renderRooms();

        updateSimulationFlags();

    }

    catch(error) {

        console.error(error);

        document.getElementById(
            "livingTemp"
        ).textContent =
            "--°C";

        document.getElementById(
            "livingHum"
        ).textContent =
            "--% RH";
    }
}

loadData();

setInterval(
    loadData,
    15000
);




    </script>

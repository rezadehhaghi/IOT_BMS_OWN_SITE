<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reziot Dashboard</title>

    <!-- PWA -->

    <link rel="manifest"
          href="manifest.json">

    <meta name="theme-color"
          content="#2c3e50">

    <style>

        * {

            box-sizing: border-box;
        }

        body {

            font-family:
                'Segoe UI',
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #eef2f7,
                    #dbe7f1
                );

            margin: 0;

            padding: 15px;

            text-align: center;

            min-height: 100vh;
        }

        .container {

            max-width: 1100px;

            margin: auto;
        }

        /* =====================================================
           HEADER
        ===================================================== */

        .main-title {

            font-size: 2rem;

            color: #2c3e50;

            margin-bottom: 5px;
        }

        .subtitle {

            color: #7f8c8d;

            margin-bottom: 20px;

            font-size: 0.95rem;
        }

        /* =====================================================
           PANELS
        ===================================================== */

        .main-panels {

            display: flex;

            flex-wrap: wrap;

            justify-content: center;

            gap: 18px;

            margin-bottom: 20px;
        }

        .panel {

            background: white;

            border-radius: 22px;

            padding: 20px;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.08);

            flex: 1;

            min-width: 300px;

            max-width: 480px;
        }

        /* =====================================================
           WEATHER
        ===================================================== */

        .weather-icon {

            width: 70px;

            height: 70px;
        }

        .weather-temp {

            font-size: 2.5rem;

            font-weight: bold;

            color: #f39c12;

            margin: 5px 0;
        }

        .weather-desc {

            color: #2c3e50;

            font-size: 1rem;

            text-transform: capitalize;
        }

        .location {

            color: #7f8c8d;

            font-size: 0.9rem;

            margin-bottom: 8px;
        }

        /* =====================================================
           SENSOR GRID
        ===================================================== */

        .sensor-grid {

            display: grid;

            grid-template-columns:
                repeat(3, 1fr);

            gap: 12px;

            margin-top: 15px;
        }

        .sensor-box {

            background: #f8fafc;

            border-radius: 16px;

            padding: 15px 10px;
        }

        .sensor-title {

            color: #7f8c8d;

            font-size: 0.8rem;

            margin-bottom: 8px;
        }

        .sensor-value {

            font-size: 1.3rem;

            font-weight: bold;
        }

        .temp-color {

            color: #2ecc71;
        }

        .hum-color {

            color: #3498db;
        }

        .press-color {

            color: #e67e22;
        }

        .updated {

            margin-top: 15px;

            color: #7f8c8d;

            font-size: 0.85rem;
        }

        /* =====================================================
           BUTTONS
        ===================================================== */

        .nav-buttons {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 12px;

            margin-top: 10px;
        }

        .nav-btn {

            text-decoration: none;

            padding: 14px;

            border-radius: 14px;

            background: #2c3e50;

            color: white;

            font-weight: bold;

            font-size: 0.95rem;

            transition: 0.2s;
        }

        .nav-btn:hover {

            transform: translateY(-2px);
        }

        .grafana-btn {

            background: #e67e22;
        }

        .thingspeak-btn {

            background: #c0392b;
        }

        .control-btn {

            background: #16a085;
        }

        @media (max-width: 768px) {

            .main-title {

                font-size: 1.7rem;
            }

            .sensor-grid {

                grid-template-columns:
                    repeat(3, 1fr);
            }

            .nav-buttons {

                grid-template-columns:
                    repeat(2, 1fr);
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <h1 class="main-title">
            🌦️ Reziot Dashboard
        </h1>

        <p class="subtitle">
            Smart Weather Monitoring
        </p>

        <!-- PANELS -->

        <div class="main-panels">

            <!-- INDOOR -->

            <div class="panel">

                <h2>
                    🏠 Indoor
                </h2>

                <div class="sensor-grid">

                    <!-- TEMP -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Temp
                        </div>

                        <div id="sensor-data"
                             class="sensor-value temp-color">

                            --

                        </div>

                    </div>

                    <!-- HUM -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Humidity
                        </div>

                        <div id="humidity-data"
                             class="sensor-value hum-color">

                            --

                        </div>

                    </div>

                    <!-- PRESS -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Pressure
                        </div>

                        <div id="pressure-data"
                             class="sensor-value press-color">

                            --

                        </div>

                    </div>

                </div>

                <div id="timestamp"
                     class="updated">

                    Connecting...

                </div>

            </div>

            <!-- OUTDOOR -->

            <div class="panel">

                <h2>
                    ☀️ Outdoor
                </h2>

                <div class="location">
                    Vantaa, Finland
                </div>

                <img id="weather-icon"
                     class="weather-icon"
                     src="https://openweathermap.org/img/wn/01d@2x.png"
                     alt="Weather">

                <div id="weather-temp"
                     class="weather-temp">

                    --

                </div>

                <div id="weather-desc"
                     class="weather-desc">

                    Loading...

                </div>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="nav-buttons">

            <a href="./charts.html"
               class="nav-btn">

                📈 Charts

            </a>

            <a href="#"
               class="nav-btn control-btn">

                🎛️ Control

            </a>

            <a href="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305"
               target="_blank"
               class="nav-btn grafana-btn">

                📊 Grafana

            </a>

            <a href="https://thingspeak.mathworks.com/channels/3386022"
               target="_blank"
               class="nav-btn thingspeak-btn">

                📡 ThingSpeak

            </a>

        </div>

    </div>

    <script>

        // =====================================================
        // API URLs
        // =====================================================

        const apiUrl =
            "https://bms-api.reziot.xyz/latest";

        const weatherUrl =
            "https://bms-api.reziot.xyz/weather";

        // =====================================================
        // SENSOR DATA
        // =====================================================

        async function getLiveValue() {

            try {

                const response =
                    await fetch(apiUrl);

                const data =
                    await response.json();

                const rawTime =

                    new Date(

                        data.created_at
                            .replace(
                                " ",
                                "T"
                            ) + "Z"
                    );

                const formattedTime =

                    rawTime.toLocaleTimeString(
                        "fi-FI"
                    );

                const now = new Date();

                const diffMinutes =

                    (now - rawTime)
                    / 1000 / 60;

                if (diffMinutes > 5) {

                    document.getElementById(
                        'timestamp'
                    ).innerText =

                        "⚠️ Sensor Offline";

                    return;
                }

                document.getElementById(
                    'sensor-data'
                ).innerText =
                    data.temperature + "°C";

                document.getElementById(
                    'humidity-data'
                ).innerText =
                    data.humidity + "%";

                document.getElementById(
                    'pressure-data'
                ).innerText =
                    data.pressure + " hPa";

                document.getElementById(
                    'timestamp'
                ).innerText =
                    "Updated: " +
                    formattedTime;
            }

            catch(error) {

                console.error(error);

                document.getElementById(
                    'timestamp'
                ).innerText =
                    "Connection Error";
            }
        }

        // =====================================================
        // WEATHER
        // =====================================================

        async function getWeather() {

            try {

                const response =
                    await fetch(weatherUrl);

                const data =
                    await response.json();

                document.getElementById(
                    "weather-temp"
                ).innerText =

                    Math.round(
                        data.main.temp
                    ) + "°C";

                document.getElementById(
                    "weather-desc"
                ).innerText =

                    data.weather[0]
                        .description;

                document.getElementById(
                    "weather-icon"
                ).src =

                    "https://openweathermap.org/img/wn/" +
                    data.weather[0].icon +
                    "@2x.png";

            }

            catch(error) {

                console.error(error);

                document.getElementById(
                    "weather-temp"
                ).innerText =
                    "--";

                document.getElementById(
                    "weather-desc"
                ).innerText =
                    "Unavailable";
            }
        }

        // =====================================================
        // INITIAL LOAD
        // =====================================================

        getLiveValue();

        getWeather();

        // =====================================================
        // AUTO REFRESH
        // =====================================================

        setInterval(
            getLiveValue,
            15000
        );

        setInterval(
            getWeather,
            600000
        );

        // =====================================================
        // SERVICE WORKER
        // =====================================================

        if (
            "serviceWorker"
            in navigator
        ) {

            navigator
                .serviceWorker
                .register("./sw.js");
        }

    </script>

</body>

</html>

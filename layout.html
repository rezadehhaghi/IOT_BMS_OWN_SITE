<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Reziot Home Layout</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(
        135deg,
        #eef2f7,
        #dbe7f1
    );
    margin:0;
    padding:15px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.main-title{
    text-align:center;
    font-size:2rem;
    color:#2c3e50;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:20px;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
}

.layout-card{
    background:white;
    border-radius:22px;
    padding:5px;
    box-shadow:
        0 8px 24px rgba(0,0,0,0.08);
}

svg{
    width:100%;
    height:auto;
    display:block;
}

.room{
    fill:#d5d9dd;
    stroke:white;
    stroke-width:8;
    transition:0.3s;
    cursor:pointer;
}

.room:hover{
    opacity:0.9;
}

.online{
    fill:#2ecc71;
}

.offline{
    fill:#d5d9dd;
}

.label{
    fill:#2c3e50;
    text-anchor:middle;
    font-family:'Segoe UI',sans-serif;
}

.room-name{
    font-size:42px;
    font-weight:700;
}

.room-value{
    font-size:110px;
    font-weight:700;
}

.room-sub{
    font-size:46px;
}

.small-room{
    font-size:34px;
    font-weight:700;
}

.legend{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:20px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:10px;
}

.legend-color{
    width:18px;
    height:18px;
    border-radius:50%;
}

@media(max-width:768px){

    .room-name{
        font-size:48px;
    }

    .room-value{
        font-size:130px;
    }

    .room-sub{
        font-size:52px;
    }

    .small-room{
        font-size:36px;
    }
}

</style>

</head>

<body>

<div class="container">

    <h1 class="main-title">
        🏠 Home Layout
    </h1>

    <p class="subtitle">
        Apartment Environmental Monitoring
    </p>

    <a href="./index.html"
       class="back-btn">

        ← Dashboard

    </a>

    <div class="layout-card">

        <svg viewBox="0 0 1000 1400"
             xmlns="http://www.w3.org/2000/svg">

            <!-- Living Room -->

            <rect id="livingRoom"
                  class="room online"
                  x="30"
                  y="30"
                  width="940"
                  height="520"/>

            <!-- Entrance -->

            <rect id="entrance"
                  class="room offline"
                  x="30"
                  y="580"
                  width="300"
                  height="190"/>

            <!-- Bathroom -->

            <rect id="bathroom"
                  class="room offline"
                  x="350"
                  y="580"
                  width="300"
                  height="190"/>

            <!-- Balcony -->

            <rect id="balcony"
                  class="room offline"
                  x="670"
                  y="580"
                  width="300"
                  height="190"/>

            <!-- Kitchen -->

            <rect id="kitchen"
                  class="room offline"
                  x="30"
                  y="800"
                  width="940"
                  height="230"/>

            <!-- Bedroom -->

            <rect id="bedroom"
                  class="room offline"
                  x="30"
                  y="1060"
                  width="940"
                  height="300"/>

            <!-- Living Room -->

            <text x="500"
                  y="140"
                  class="label room-name">

                Living Room

            </text>

            <text id="livingTemp"
                  x="500"
                  y="315"
                  class="label room-value">

                --

            </text>

            <text id="livingHum"
                  x="500"
                  y="430"
                  class="label room-sub">

                --

            </text>

            <!-- Entrance -->

            <text x="180"
                  y="690"
                  class="label small-room">

                Entrance

            </text>

            <!-- Bathroom -->

            <text x="500"
                  y="690"
                  class="label small-room">

                Bathroom

            </text>

            <!-- Balcony -->

            <text x="820"
                  y="690"
                  class="label small-room">

                Balcony

            </text>

            <!-- Kitchen -->

            <text x="500"
                  y="935"
                  class="label room-name">

                Kitchen

            </text>

            <!-- Bedroom -->

            <text x="500"
                  y="1235"
                  class="label room-name">

                Bedroom

            </text>

        </svg>

        <div class="legend">

            <div class="legend-item">

                <div class="legend-color"
                     style="background:#2ecc71;">
                </div>

                Sensor Online

            </div>

            <div class="legend-item">

                <div class="legend-color"
                     style="background:#d5d9dd;">
</script>

</body>
</html>

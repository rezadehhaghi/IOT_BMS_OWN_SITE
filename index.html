<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reziot Smart Weather Station</title>

    <style>

        body {

            font-family:
                'Segoe UI',
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #eef2f7,
                    #dbe7f1
                );

            margin: 0;

            padding: 30px;

            text-align: center;
        }

        .container {

            max-width: 1200px;

            margin: auto;
        }

        .main-title {

            font-size: 3rem;

            color: #2c3e50;

            margin-bottom: 10px;
        }

        .subtitle {

            color: #7f8c8d;

            margin-bottom: 40px;

            font-size: 1.1rem;
        }

        /* =====================================================
           MAIN PANELS
        ===================================================== */

        .main-panels {

            display: flex;

            flex-wrap: wrap;

            justify-content: center;

            gap: 30px;

            margin-bottom: 40px;
        }

        .panel {

            background: white;

            border-radius: 24px;

            padding: 30px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);

            flex: 1;

            min-width: 320px;

            max-width: 500px;
        }

        /* =====================================================
           WEATHER PANEL
        ===================================================== */

        .weather-temp {

            font-size: 4rem;

            font-weight: bold;

            color: #f39c12;

            margin: 10px 0;
        }

        .weather-desc {

            font-size: 1.2rem;

            color: #2c3e50;
        }

        .weather-icon {

            width: 100px;

            height: 100px;
        }

        .location {

            color: #7f8c8d;

            margin-bottom: 10px;
        }

        /* =====================================================
           SENSOR GRID
        ===================================================== */

        .sensor-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(140px, 1fr));

            gap: 20px;

            margin-top: 25px;
        }

        .sensor-box {

            background: #f8fafc;

            border-radius: 18px;

            padding: 20px;
        }

        .sensor-title {

            color: #7f8c8d;

            font-size: 0.95rem;

            margin-bottom: 10px;
        }

        .sensor-value {

            font-size: 2rem;

            font-weight: bold;
        }

        .temp-color {

            color: #2ecc71;
        }

        .hum-color {

            color: #3498db;
        }

        .press-color {

            color: #e67e22;
        }

        .updated {

            margin-top: 20px;

            color: #7f8c8d;

            font-size: 0.9rem;
        }

        /* =====================================================
           BUTTONS
        ===================================================== */

        .nav-buttons {

            display: flex;

            justify-content: center;

            flex-wrap: wrap;

            gap: 20px;

            margin-top: 30px;
        }

        .nav-btn {

            text-decoration: none;

            padding: 14px 28px;

            border-radius: 12px;

            background: #2c3e50;

            color: white;

            font-weight: bold;

            transition: 0.2s;
        }

        .nav-btn:hover {

            background: #34495e;

            transform: translateY(-2px);
        }

        .grafana-btn {

            background: #e67e22;
        }

        .grafana-btn:hover {

            background: #d35400;
        }

        @media (max-width: 768px) {

            .main-title {

                font-size: 2.2rem;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <h1 class="main-title">
            🌦️ Reziot Smart Weather Station
        </h1>

        <p class="subtitle">
            Outdoor weather + Indoor ESP32 monitoring
        </p>

        <!-- MAIN PANELS -->

        <div class="main-panels">

    
            <!-- INDOOR SENSOR -->

            <div class="panel">

                <h2>
                    🏠 Indoor ESP32 Sensors
                </h2>

                <div class="sensor-grid">

                    <!-- TEMP -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Temperature
                        </div>

                        <div id="sensor-data"
                             class="sensor-value temp-color">

                            --

                        </div>

                    </div>

                    <!-- HUMIDITY -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Humidity
                        </div>

                        <div id="humidity-data"
                             class="sensor-value hum-color">

                            --

                        </div>

                    </div>

                    <!-- PRESSURE -->

                    <div class="sensor-box">

                        <div class="sensor-title">
                            Pressure
                        </div>

                        <div id="pressure-data"
                             class="sensor-value press-color">

                            --

                        </div>

                    </div>

                </div>

                <div id="timestamp"
                     class="updated">

                    Connecting to server...

                </div>

            </div>

        </div>
             <!-- OUTDOOR WEATHER -->

            <div class="panel">

                <h2>
                    ☀️ Outdoor Weather
                </h2>

                <div class="location">
                    Vantaa, Finland
                </div>

                <img id="weather-icon"
                     class="weather-icon"
                     src=""
                     alt="Weather">

                <div id="weather-temp"
                     class="weather-temp">

                    Loading...

                </div>

                <div id="weather-desc"
                     class="weather-desc">

                    Loading weather...

                </div>

            </div>
   

        <!-- BUTTONS -->

        <div class="nav-buttons">

            <a href="./charts.html"
               class="nav-btn">

                📈 Charts

            </a>

            <a href="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305"
               target="_blank"
               class="nav-btn grafana-btn">

                📊 Grafana

            </a>

        </div>

    </div>

    <script>

        // =====================================================
        // API URL
        // =====================================================

        const apiUrl =
            "https://bms-api.reziot.xyz/latest";

        // =====================================================
        // ESP32 SENSOR DATA
        // =====================================================

        async function getLiveValue() {

            try {

                const response =
                    await fetch(apiUrl);

                const data =
                    await response.json();

                const rawTime =
                    new Date(data.created_at);

                const formattedTime =
                    rawTime.toLocaleTimeString();

                document.getElementById(
                    'sensor-data'
                ).innerText =
                    data.temperature + "°C";

                document.getElementById(
                    'humidity-data'
                ).innerText =
                    data.humidity + "%";

                document.getElementById(
                    'pressure-data'
                ).innerText =
                    data.pressure + " hPa";

                document.getElementById(
                    'timestamp'
                ).innerText =
                    "Last update: " +
                    formattedTime;

            }

            catch(error) {

                console.error(error);

                document.getElementById(
                    'timestamp'
                ).innerText =
                    "Sensor connection error";
            }
        }

        // =====================================================
        // WEATHER
        // =====================================================

        async function getWeather() {

            try {

                const weatherUrl =
                    "https://bms-api.reziot.xyz/weather";
                const response =
                    await fetch(weatherUrl);

                const data =
                    await response.json();

                console.log(data);

                document.getElementById(
                    "weather-temp"
                ).innerText =

                    Math.round(
                        data.main.temp
                    ) + "°C";

                document.getElementById(
                    "weather-desc"
                ).innerText =

                    data.weather[0].description;

                document.getElementById(
                    "weather-icon"
                ).src =

                    "https://openweathermap.org/img/wn/" +
                    data.weather[0].icon +
                    "@2x.png";

            }

            catch(error) {

                console.error(error);

                document.getElementById(
                    "weather-temp"
                ).innerText =
                    "--";

                document.getElementById(
                    "weather-desc"
                ).innerText =
                    "Weather unavailable";
            }
        }

        // =====================================================
        // INITIAL LOAD
        // =====================================================

        getLiveValue();

        getWeather();

        // =====================================================
        // AUTO REFRESH
        // =====================================================

        setInterval(
            getLiveValue,
            15000
        );

        setInterval(
            getWeather,
            600000
        );

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Reziot Dashboard</title>

<!-- PWA -->

<link rel="manifest"
      href="manifest.json">

<meta name="theme-color"
      content="#2c3e50">

<style>

    * {

        box-sizing: border-box;
    }

    body {

        font-family:
            'Segoe UI',
            Tahoma,
            Geneva,
            Verdana,
            sans-serif;

        background:
            linear-gradient(
                135deg,
                #eef2f7,
                #dbe7f1
            );

        margin: 0;

        padding: 15px;

        text-align: center;

        min-height: 100vh;
    }

    .container {

        max-width: 1100px;

        margin: auto;
    }

    /* =====================================================
       HEADER
    ===================================================== */

    .main-title {

        font-size: 2rem;

        color: #2c3e50;

        margin-bottom: 5px;
    }

    .subtitle {

        color: #7f8c8d;

        margin-bottom: 5px;

        font-size: 0.95rem;
    }

    /* =====================================================
       PANELS
    ===================================================== */

    .main-panels {

        display: flex;

        flex-wrap: wrap;

        justify-content: center;

        gap: 5px;

        margin-bottom: 5px;
    }

    .panel {

        background: white;

        border-radius: 22px;

        padding: 10px;

        box-shadow:
            0 8px 24px rgba(0,0,0,0.08);

        flex: 1;

        min-width: 300px;

        max-width: 480px;
    }

    /* =====================================================
       WEATHER
    ===================================================== */

    .weather-icon {

        width: 50px;

        height: 50px;
    }

    .weather-temp {

        font-size: 2rem;

        font-weight: bold;

        color: #f39c12;

        margin: 5px 0;
    }

    .weather-desc {

        color: #2c3e50;

        font-size: 1rem;

        text-transform: capitalize;
    }

    .location {

        color: #7f8c8d;

        font-size: 0.9rem;

        margin-bottom: 0px;
    }
.panel {
    padding: 5px;
}

.weather-icon {
    width: 30px;
    height: 30px;
}

.weather-temp {
    font-size: 2rem;
    margin: 0;
}

.weather-desc {
    font-size: 0.9rem;
}

.location {
    font-size: 0.9rem;
}

.sensor-box {
    padding: 8px;
}

.sensor-title {
    font-size: 0.7rem;
}

.sensor-value {
    font-size: 1rem;
}

#weather-details .sensor-grid {
    gap: 5px;
}

#weather-details {
    margin-top: 5px;
}

#weather-details .updated {
    font-size: 0.75rem;
}
    /* =====================================================
       SENSOR GRID
    ===================================================== */

    .sensor-grid {

        display: grid;

        grid-template-columns:
            repeat(3, 1fr);

        gap: 5px;

        margin-top: 5px;
    }

    .sensor-box {

        background: #f8fafc;

        border-radius: 16px;

        padding: 10px 10px;
    }

    .sensor-title {

        color: #7f8c8d;

        font-size: 0.8rem;

        margin-bottom: 5px;
    }

    .sensor-value {

        font-size: 1.3rem;

        font-weight: bold;
    }

    .temp-color {

        color: #2ecc71;
    }

    .hum-color {

        color: #3498db;
    }

    .press-color {

        color: #e67e22;
    }

    .updated {

        margin-top: 15px;

        color: #7f8c8d;

        font-size: 0.95rem;
    }

    /* =====================================================
       BUTTONS
    ===================================================== */

      .layout-btn {

    background: #8e44ad;
      }

      
    .nav-buttons {

        display: grid;

        grid-template-columns:
            repeat(2, 1fr);

        gap: 12px;

        margin-top: 10px;
    }

    .nav-btn {

        text-decoration: none;

        padding: 14px;

        border-radius: 14px;

        background: #2c3e50;

        color: white;

        font-weight: bold;

        font-size: 0.95rem;

        transition: 0.2s;
    }

    .nav-btn:hover {

        transform: translateY(-2px);
    }

    .grafana-btn {

        background: #e67e22;
    }

    .thingspeak-btn {

        background: #c0392b;
    }

    .control-btn {

        background: #16a085;
    }

    @media (max-width: 768px) {

        .main-title {

            font-size: 1.7rem;
        }

        .sensor-grid {

            grid-template-columns:
                repeat(3, 1fr);
        }

        .nav-buttons {

            grid-template-columns:
                repeat(2, 1fr);
        }
    }

.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%; /* Ensures it stretches the full width */
    margin-bottom: 5px;
}



</style>

<div class="container">

    <!-- HEADER -->

    <h1 class="main-title">
        🌦️ Reziot Dashboard
    </h1>

    <!-- PANELS -->

      
    <div class="main-panels">

        <!-- INDOOR -->

        <div class="panel">

            <h2>
                🏠 Indoor
            </h2>

            <div class="sensor-grid">

                <!-- TEMP -->

                <div class="sensor-box">

                    <div class="sensor-title">
                        Temp
                    </div>

                    <div id="sensor-data"
                         class="sensor-value temp-color">

                        --

                    </div>

                </div>

                <!-- HUM -->

                <div class="sensor-box">

                    <div class="sensor-title">
                        Humidity
                    </div>

                    <div id="humidity-data"
                         class="sensor-value hum-color">

                        --

                    </div>

                </div>

                <!-- PRESS -->

                <div class="sensor-box">

                    <div class="sensor-title">
                        Pressure
                    </div>

                    <div id="pressure-data"
                         class="sensor-value press-color">

                        --

                    </div>

                </div>          

            </div>

             

<div class="nav-container">
    <a href="./layout.html" class="nav-btn layout-btn">🏠 Home Layout</a>
    <div id="timestamp" class="updated">Connecting...</div>
</div>





        </div>



        <!-- OUTDOOR -->

        <div class="panel">

            <h2>
  <!-- OUTDOOR -->

<div class="panel">

    <h3> ⛰️ Outdoor</h3>

    <div id="location" class="location">
        Loading...
    </div>

    <img id="weather-icon"
         class="weather-icon"
         src=""
         alt="Weather">

    <div id="weather-temp"
         class="weather-temp">
        --
    </div>

    <div id="weather-desc"
         class="weather-desc">
        Loading...
    </div>

    <button
        onclick="toggleWeatherInfo()"
        class="nav-btn"
        style="margin-top:15px;padding:10px 18px;font-size:0.85rem;">
        More Info
    </button>

    <div id="weather-details"
         style="display:none;margin-top:5px;">

        <div class="sensor-grid">

            <div class="sensor-box">
                <div class="sensor-title">Feels Like</div>
                <div id="feels-like" class="sensor-value temp-color">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Humidity</div>
                <div id="out-humidity" class="sensor-value hum-color">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Pressure</div>
                <div id="out-pressure" class="sensor-value press-color">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Wind</div>
                <div id="wind-speed" class="sensor-value">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Wind Dir</div>
                <div id="wind-dir" class="sensor-value">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Clouds</div>
                <div id="cloud-cover" class="sensor-value">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Visibility</div>
                <div id="visibility" class="sensor-value">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Min Temp</div>
                <div id="temp-min" class="sensor-value">--</div>
            </div>

            <div class="sensor-box">
                <div class="sensor-title">Max Temp</div>
                <div id="temp-max" class="sensor-value">--</div>
            </div>

        </div>

        <div class="updated">
            🌅 <span id="sunrise">--</span>
            |
            🌇 <span id="sunset">--</span>
        </div>

    </div>

</div>

    <!-- BUTTONS -->

    <div class="nav-buttons">

        <a href="./charts.html"
           class="nav-btn">

            📈 Charts

        </a>

        <a href="#"
           class="nav-btn control-btn">

            🎛️ Control

        </a>

        <a href="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305"
           target="_blank"
           class="nav-btn grafana-btn">

            📊 Grafana

        </a>

        <a href="https://thingspeak.mathworks.com/channels/3386022"
           target="_blank"
           class="nav-btn thingspeak-btn">

            📡 ThingSpeak

        </a>

    </div>

</div>

<script>

    // =====================================================
    // API URLs
    // =====================================================

    const apiUrl =
        "https://bms-api.reziot.xyz/latest";

    const weatherUrl =
        "https://bms-api.reziot.xyz/weather";

    // =====================================================
    // SENSOR DATA
    // =====================================================

    async function getLiveValue() {

        try {

            const response =
                await fetch(apiUrl);

            const data =
                await response.json();
                  console.log(data);
            const rawTime =

                new Date(

                    data.created_at
                        .replace(
                            " ",
                            "T"
                        ) + "Z"
                );

            const formattedTime =

                rawTime.toLocaleTimeString(
                    "fi-FI"
                );

            const now = new Date();

            const diffMinutes =

                (now - rawTime)
                / 1000 / 60;

            if (diffMinutes > 5) {

                document.getElementById(
                    'timestamp'
                ).innerText =

                    "⚠️ Sensor Offline";

                return;
            }

            document.getElementById(
                'sensor-data'
            ).innerText =
                data.temperature + "°C";

            document.getElementById(
                'humidity-data'
            ).innerText =
                data.humidity + "%";

            document.getElementById(
                'pressure-data'
            ).innerText =
                data.pressure + " hPa";

            document.getElementById(
                'timestamp'
            ).innerText =
                "Updated: " +
                formattedTime;
        }

        catch(error) {

            console.error(error);

            document.getElementById(
                'timestamp'
            ).innerText =
                "Connection Error";
        }
    }

    // =====================================================
    // WEATHER
    // =====================================================

    async function getWeather() {

    try {

        const response =
            await fetch(weatherUrl);

        const data =
            await response.json();

        console.log(data);

        document.getElementById("location").textContent =
            data.name + ", " + data.sys.country;

        document.getElementById("weather-temp").textContent =
            Math.round(data.main.temp) + "°C";

        document.getElementById("weather-desc").textContent =
            data.weather[0].description;

        document.getElementById("weather-icon").src =
            "https://openweathermap.org/img/wn/" +
            data.weather[0].icon +
            "@2x.png";

        document.getElementById("feels-like").textContent =
            Math.round(data.main.feels_like) + "°C";

        document.getElementById("out-humidity").textContent =
            data.main.humidity + "%";

        document.getElementById("out-pressure").textContent =
            data.main.pressure + " hPa";

        document.getElementById("wind-speed").textContent =
            data.wind.speed + " m/s";

        document.getElementById("wind-dir").textContent =
            data.wind.deg + "°";

        document.getElementById("cloud-cover").textContent =
            data.clouds.all + "%";

        document.getElementById("visibility").textContent =
            (data.visibility / 1000).toFixed(1) + " km";

        document.getElementById("temp-min").textContent =
            Math.round(data.main.temp_min) + "°C";

        document.getElementById("temp-max").textContent =
            Math.round(data.main.temp_max) + "°C";

        document.getElementById("sunrise").textContent =
            new Date(data.sys.sunrise * 1000)
            .toLocaleTimeString("fi-FI", {
                hour: "2-digit",
                minute: "2-digit"
            });

        document.getElementById("sunset").textContent =
            new Date(data.sys.sunset * 1000)
            .toLocaleTimeString("fi-FI", {
                hour: "2-digit",
                minute: "2-digit"
            });

    } catch (error) {

        console.error(
            "Weather Error:",
            error
        );
    }
}
    // =====================================================
    // INITIAL LOAD
    // =====================================================

    getLiveValue();

    getWeather();

    // =====================================================
    // AUTO REFRESH
    // =====================================================

    setInterval(
        getLiveValue,
        15000
    );

    setInterval(
        getWeather,
        600000
    );

    // =====================================================
    // SERVICE WORKER
    // =====================================================

    if (
        "serviceWorker"
        in navigator
    ) {

        navigator
            .serviceWorker
            .register("./sw.js");
    }
function toggleWeatherInfo() {

    const details =
        document.getElementById(
            "weather-details"
        );

    if (
        details.style.display ===
        "none"
    ) {

        details.style.display =
            "block";

    }
    else {

        details.style.display =
            "none";
    }
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reziot Home Layout</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dbe7f1);
    margin:0;
    padding:15px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.main-title{
    font-size:2rem;
    color:#2c3e50;
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:20px;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
}

.layout-card{
    background:white;
    border-radius:22px;
    padding:20px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

svg{
    width:100%;
    height:auto;
}

.room{
    stroke:#ffffff;
    stroke-width:4;
    fill:#d1d5db;
    cursor:pointer;
    transition:.3s;
}

.room:hover{
    opacity:.85;
}

.online{
    fill:#2ecc71;
}

.offline{
    fill:#bdc3c7;
}

.label{
    fill:#2c3e50;
    font-family:'Segoe UI',sans-serif;
    text-anchor:middle;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.temp{
    font-size:26px;
    font-weight:bold;
}

.hum{
    font-size:16px;
}

.legend{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
}

.legend-color{
    width:16px;
    height:16px;
    border-radius:50%;
}

@media(max-width:768px){

    .name{
        font-size:14px;
    }

    .temp{
        font-size:18px;
    }

    .hum{
        font-size:13px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1 class="main-title">
        🏠 Home Layout
    </h1>

    <p class="subtitle">
        Apartment Environmental Monitoring
    </p>

    <a href="./index.html" class="back-btn">
        ← Dashboard
    </a>

    <div class="layout-card">

        <svg viewBox="0 0 1000 700"
             xmlns="http://www.w3.org/2000/svg">

            <!-- Entrance -->

            <polygon id="entrance"
                     class="room offline"
                     points="
                     120,80
                     320,80
                     320,200
                     120,200"/>

            <!-- Bathroom -->

            <polygon id="bathroom"
                     class="room offline"
                     points="
                     120,210
                     320,210
                     320,430
                     120,430"/>

            <!-- Living Room -->

            <polygon id="livingRoom"
                     class="room online"
                     points="
                     340,80
                     850,80
                     850,390
                     730,390
                     730,430
                     560,430
                     560,390
                     340,390"/>

            <!-- Kitchen -->

            <polygon id="kitchen"
                     class="room offline"
                     points="
                     340,280
                     550,280
                     550,430
                     340,430"/>

            <!-- Bedroom -->

            <polygon id="bedroom"
                     class="room offline"
                     points="
                     380,450
                     760,450
                     760,620
                     380,620"/>

            <!-- Balcony -->

            <polygon id="balcony"
                     class="room offline"
                     points="
                     770,390
                     930,390
                     930,640
                     770,640"/>

            <!-- Labels -->

            <text x="595"
                  y="170"
                  class="label name">
                Living Room
            </text>

            <text id="livingTemp"
                  x="595"
                  y="235"
                  class="label temp">
                --
            </text>

            <text id="livingHum"
                  x="595"
                  y="275"
                  class="label hum">
                --
            </text>

            <text x="220"
                  y="145"
                  class="label name">
                Entrance
            </text>

            <text x="220"
                  y="330"
                  class="label name">
                Bathroom
            </text>

            <text x="445"
                  y="365"
                  class="label name">
                Kitchen
            </text>

            <text x="570"
                  y="545"
                  class="label name">
                Bedroom
            </text>

            <text x="850"
                  y="525"
                  class="label name">
                Balcony
            </text>

        </svg>

        <div class="legend">

            <div class="legend-item">
                <div class="legend-color"
                     style="background:#2ecc71"></div>
                Sensor Online
            </div>

            <div class="legend-item">
                <div class="legend-color"
                     style="background:#bdc3c7"></div>
                No Sensor Installed
            </div>

        </div>

    </div>

</div>

<script>

const apiUrl =
    "https://bms-api.reziot.xyz/latest";

async function loadData(){

    try{

        const response =
            await fetch(apiUrl);

        const data =
            await response.json();

        document.getElementById(
            "livingTemp"
        ).textContent =
            data.temperature + "°C";

        document.getElementById(
            "livingHum"
        ).textContent =
            data.humidity + "% RH";

    }

    catch(error){

        console.error(
            "Layout Error:",
            error
        );
    }
}

loadData();

setInterval(
    loadData,
    15000
);

document
.getElementById("livingRoom")
.addEventListener("click",()=>{

    alert(
        "Living Room\n\nCurrent sensor installed here."
    );

});

</script>

</body>
</html>

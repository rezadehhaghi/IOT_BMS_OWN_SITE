<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sensor Analytics</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            background-color: #1f2833;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 24px;
            margin-top: 10px;
            border: 1px solid #45f3ff33;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #0b0c10;
            padding-bottom: 15px;
        }
        .header h1 {
            color: #45f3ff;
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header p {
            color: #66fcf1;
            margin: 5px 0 0 0;
            font-size: 14px;
            font-weight: bold;
        }
        .visual-frame-wrapper {
            position: relative;
            width: 100%;
            height: 550px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #121214;
        }
        /* Using native HTML object rendering cleanly embeds the target stream */
        .analytics-render {
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer-metrics {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #8d8d99;
        }
        .fallback-btn {
            display: inline-block;
            background-color: #45f3ff;
            color: #0b0c10;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .fallback-btn:hover { background-color: #66fcf1; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>IoT Weather Station Monitor</h1>
        <p>Live ESP32 Sensor Stream</p>
    </div>

    <div class="visual-frame-wrapper">
        <!-- Object elements execute full-context page data loads seamlessly -->
        <object 
            class="analytics-render"
            data="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305?from=now-1h&to=now&timezone=browser&kiosk=1"
            type="text/html">
            <div style="padding: 40px; text-align: center;">
                <p>Your browser environment is restricting standard dashboard frame attachments.</p>
                <a href="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305?from=now-1h&to=now&timezone=browser" target="_blank" class="fallback-btn">
                    Launch Interactive Graph Dashboard
                </a>
            </div>
        </object>
    </div>

    <div class="footer-metrics">
        Data updated automatically via cloud polling • Powered by InfluxDB & GitHub Pages
    </div>
</div>

</body>
</html>

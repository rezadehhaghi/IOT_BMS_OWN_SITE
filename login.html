<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>REZIOT BMS</title>

<style>

/* ======================================
   GLOBAL
====================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b
    );

    position:relative;
}

/* ======================================
   ANIMATED BACKGROUND
====================================== */

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    opacity:.35;

    animation:float 12s infinite ease-in-out;
}

.blob1{

    width:300px;
    height:300px;

    background:#06b6d4;

    top:-80px;
    left:-80px;
}

.blob2{

    width:250px;
    height:250px;

    background:#3b82f6;

    bottom:-50px;
    right:-50px;

    animation-delay:3s;
}

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-40px);
    }
}

/* ======================================
   LOGIN CARD
====================================== */

.login-card{

    width:400px;
    max-width:90%;

    padding:40px;

    border-radius:24px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid
    rgba(255,255,255,0.1);

    box-shadow:
    0 20px 50px rgba(0,0,0,.4);

    z-index:10;
}

/* ======================================
   HEADER
====================================== */

.logo{

    text-align:center;

    color:white;

    margin-bottom:30px;
}

.logo h1{

    font-size:38px;
    letter-spacing:3px;
}

.logo h2{

    color:#38bdf8;

    margin-top:5px;

    font-size:20px;
}

.logo p{

    color:#94a3b8;

    margin-top:10px;
}

/* ======================================
   INPUTS
====================================== */

.input-group{

    margin-bottom:18px;
}

.input-group label{

    display:block;

    color:white;

    margin-bottom:8px;
}

.input-group input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    outline:none;
}

.input-group input::placeholder{

    color:#94a3b8;
}

/* ======================================
   BUTTON
====================================== */

#loginBtn{

    width:100%;

    border:none;

    padding:15px;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;
    font-weight:700;

    color:white;

    background:
    linear-gradient(
        135deg,
        #06b6d4,
        #3b82f6
    );

    transition:.25s;
}

#loginBtn:hover{

    transform:translateY(-2px);
}

/* ======================================
   STATUS
====================================== */

#status{

    margin-top:15px;

    text-align:center;

    color:white;
}

</style>

</head>



<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- ======================================
     LOGIN CARD
====================================== -->

<div class="login-card">

    <div class="logo">

        <h1>REZIOT</h1>

        <h2>BMS</h2>

        <p>
            Smart Building Monitoring
        </p>

    </div>

    <!-- ======================================
         EMAIL
    ====================================== -->

    <div class="input-group">

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email">

    </div>

    <!-- ======================================
         PASSWORD
    ====================================== -->

    <div class="input-group">

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter your password">

    </div>

    <!-- ======================================
         LOGIN BUTTON
    ====================================== -->

    <button id="loginBtn">
        Sign In
    </button>

    <div id="status"></div>

</div>

<script>

// ======================================
// LOGIN
// ======================================

document
.getElementById("loginBtn")
.addEventListener(
"click",
async () => {

    const email =
        document.getElementById(
            "email"
        ).value.trim();

    const password =
        document.getElementById(
            "password"
        ).value;

    const status =
        document.getElementById(
            "status"
        );

    status.textContent =
        "Signing in...";

    try {

        const response =
            await fetch(
                "https://auth.reziot.xyz/login",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({
                        email,
                        password
                    })
                }
            );

        const result =
            await response.json();

        if(result.success){

            localStorage.setItem(
                "token",
                result.token
            );

            status.textContent =
                "✅ Login successful";

            setTimeout(
                () => {

                    window.location.href =
                    "./settings.html";

                },
                1000
            );

        }

        else {

            status.textContent =
                "❌ Invalid email or password";

        }

    }

    catch(error){

        status.textContent =
            "❌ Connection error";

    }

}
);

// ======================================
// END LOGIN
// ======================================

</script>

</body>
</html>

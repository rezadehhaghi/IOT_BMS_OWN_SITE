   <div class="card">

                          <!-- INDOOR -->

<div id="updated"

<div id="weatherStatus"

 </div>
          

    <div class="card">

        <div class="card-title">
            Sensor Status
        </div>

        <div class="status-grid">

                  <div id="livingStatus"
                       class="status-box online">
                      🟢 Living Room
                  </div><div id="bedroomStatus"
                       class="status-box not-installed">
                      ⚪ Bedroom
                  </div><div id="bathroomStatus"
                       class="status-box not-installed">
                      ⚪ Bathroom
                  </div><div id="balconyStatus"
                       class="status-box not-installed">
                      ⚪ Balcony
                  </div><div id="kitchenStatus"
                       class="status-box not-installed">

                  </div>

<script>

document
.getElementById("menuBtn")
.addEventListener(
    "click",
    function(e){

        e.stopPropagation();

        document
        .getElementById(
            "menuDropdown"
        )
        .classList
        .toggle(
            "show"
        );

    }
);

document
.addEventListener(
    "click",
    function(){

        document
        .getElementById(
            "menuDropdown"
        )
        .classList
        .remove(
            "show"
        );

    }
);

const apiUrl =
    "https://bms-api.reziot.xyz/latest-all";

const weatherUrl =
    "https://bms-api.reziot.xyz/weather";



                       function updateSensorStatus(
                              sensorId,
                              elementId,
                              label,
                              data
                              ) {
                              
                              const el =
                                  document.getElementById(
                                      elementId
                                  );
                              
                              if (!data[sensorId]) {
                              
                                  el.className =
                                      "status-box not-installed";
                              
                                  el.textContent =
                                      "⚪ " + label;
                              
                                  return;
                              }
                              
                              const sensorTime =
                                  new Date(
                                      data[sensorId]
                                      .created_at
                                      .replace(" ", "T") + "Z"
                                  );
                              
                              const ageMinutes =
                                  (
                                      Date.now() -
                                      sensorTime.getTime()
                                  ) / 60000;
                              
                              if (ageMinutes > 5) {
                              
                                  el.className =
                                      "status-box offline";
                              
                                  el.textContent =
                                      "🔴 " +
                                      label +
                                      " Offline";
                              
                              } else {
                              
                                  el.className =
                                      "status-box online";
                              
                                  el.textContent =
                                      "🟢 " +
                                      label;
                              
                              }
                              
                              }
                                    
async function loadData() {

    try {

        const response =
            await fetch(apiUrl);

        const data =
            await response.json();

                           updateSensorStatus(
                              "living",
                              "livingStatus",
                              "Living Room",
                              data
                              );
                              
                              updateSensorStatus(
                              "bedroom",
                              "bedroomStatus",
                              "Bedroom",
                              data
                              );
                              
                              updateSensorStatus(
                              "bathroom",
                              "bathroomStatus",
                              "Bathroom",
                              data
                              );
                              
                              updateSensorStatus(
                              "balcony",
                              "balconyStatus",
                              "Balcony",
                              data
                              );
                              
                              updateSensorStatus(
                              "kitchen",
                              "kitchenStatus",
                              "Kitchen",
                              data
                              );

        if (!data.living) {
            return;
        }

        const rawTime =
            new Date(
                data.living.created_at
                    .replace(" ", "T") + "Z"
            );

        const now =
            new Date();

        const diffMinutes =
            (now - rawTime) / 60000;

        if (diffMinutes > 5) {

            document
            .getElementById("temp")
            .textContent =
                "--°C";

            document
            .getElementById("hum")
            .textContent =
                "--% RH";

            document
            .getElementById("pressure")
            .textContent =
                "-- hPa";

            document
            .getElementById("updated")
            .textContent =
                "🔴 Sensor Offline";

            return;
        }

        document
        .getElementById("temp")
        .textContent =
            Number(
                data.living.temperature
            ).toFixed(1) + "°C";

        document
        .getElementById("hum")
        .textContent =
            Number(
                data.living.humidity
            ).toFixed(0) + "% RH";

        document
        .getElementById("pressure")
        .textContent =
            Number(
                data.living.pressure
            ).toFixed(0) + " hPa";

        document
        .getElementById("updated")
        .textContent =
            "🟢 Updated: " +
            rawTime.toLocaleTimeString(
                "fi-FI"
            );

    }

    catch(error) {

        console.error(error);

        document
        .getElementById("updated")
        .textContent =
            "⚠️ Connection Error";

    }

}

async function loadWeather(
    lat,
    lon
) {
    try {

const response =
    await fetch(

`https://bms-api.reziot.xyz/weather?lat=${lat}&lon=${lon}`

    );

        const data =
            await response.json();

if (

    !data.coord ||

    !data.name

) {

    document
    .getElementById(
        "weatherStatus"
    )
    .textContent =

        "📍 Enable location access";

    return;

}


document
.getElementById(
    "weatherStatus"
)
.textContent =

    "🟢 " +
    data.name +
    ", " +
    data.sys.country;

        document
        .getElementById(
            "outdoorTemp"
        )
        .textContent =
            Math.round(
                data.main.temp
            ) + "°C";

        document
        .getElementById(
            "outdoorHum"
        )
        .textContent =
            data.main.humidity +
            "% RH";

        document
        .getElementById(
            "outdoorPressure"
        )
        .textContent =
            data.main.pressure +
            " hPa";

    }

    catch(error) {

        console.error(
    error
);

document
.getElementById(
    "weatherStatus"
)
.textContent =

    "🔴 Weather Offline";

    }

}

                  if (
                "serviceWorker"
                in navigator
            ) {
            
                navigator
                    .serviceWorker
                    .register(
                        "./sw.js"
                    );
            }


                                    let deferredPrompt;
                                    
                                    window.addEventListener(
                                        "beforeinstallprompt",
                                        (e) => {
                                    
                                            e.preventDefault();
                                    
                                            deferredPrompt = e;
                                    
                                            document
                                            .getElementById(
                                                "installBtn"
                                            )
                                            .style.display =
                                                "block";
                                    
                                        }
                                    );
                                    
                                    document
                                    .getElementById(
                                        "installBtn"
                                    )
                                    .addEventListener(
                                        "click",
                                        async () => {
                                    
                                            if (!deferredPrompt) {
                                                return;
                                            }
                                    
                                            deferredPrompt.prompt();
                                    
                                            await deferredPrompt.userChoice;
                                    
                                            deferredPrompt = null;
                                    
                                        }
                                    );


                                                      document
                                                      .getElementById(
                                                          "indoorCard"
                                                      )
                                                      .addEventListener(
                                                          "click",
                                                          () => {
                                                      
                                                              window.location.href =
                                                                  "./layout.html";
                                                      
                                                          }
                                                      );
                                                      
                                                      document
                                                      .getElementById(
                                                          "outdoorCard"
                                                      )
                                                      .addEventListener(
                                                          "click",
                                                          () => {
                                                      
                                                              window.location.href =
                                                                  "./weather.html";
                                                      
                                                          }
                                                      );

      
loadData();


navigator.geolocation.getCurrentPosition(

    position => {

        loadWeather(

            position.coords.latitude,

            position.coords.longitude

        );

    },

    () => {

        document
        .getElementById(
            "outdoorTemp"
        )
        .textContent =
            "--";

        document
        .getElementById(
            "outdoorHum"
        )
        .textContent =
            "--";

        document
        .getElementById(
            "outdoorPressure"
        )
        .textContent =
            "--";

        document
        .getElementById(
            "weatherStatus"
        )
        .textContent =

            "📍 Enable location access";

    }

);



setInterval(
    loadData,
    5000
);

setInterval(

    () => {

        navigator.geolocation
        .getCurrentPosition(

            position => {

                loadWeather(

                    position.coords.latitude,

                    position.coords.longitude

                );

            },

            () => {

                loadWeather(

                    38.9067,
                    1.4206

                );

            }

        );

    },

    60000

);

let startY = 0;

document.addEventListener(

    "touchstart",

    e => {

        startY =
            e.touches[0]
            .clientY;

    },

    {
        passive:false
    }

);

document.addEventListener(

    "touchmove",

    e => {

        const currentY =
            e.touches[0]
            .clientY;

        if (

            window.scrollY === 0 &&

            currentY > startY

        ) {

            e.preventDefault();

        }

    },

    {
        passive:false
    }

);

history.pushState(
    null,
    "",
    location.href
);

window.addEventListener(

    "popstate",

    () => {

        window.close();

    }

);

document.addEventListener( "visibilitychange", () => { if ( !document.hidden ) { loadData(); loadWeather(); } } );

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reziot Home Layout</title>
<style>
*{box-sizing:border-box;}
body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dbe7f1);
    margin:0;
    padding:15px;
}
.container{max-width:1100px;margin:auto;}
.main-title{text-align:center;font-size:2rem;color:#2c3e50;margin-bottom:5px;}
.subtitle{text-align:center;color:#7f8c8d;margin-bottom:20px;}
.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
}
.layout-card{
    background:white;
    border-radius:22px;
    padding:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}
svg{width:100%;height:auto;display:block;}
.room{
    fill:#d5d9dd;
    stroke:white;
    stroke-width:8;
    transition:.3s;
    cursor:pointer;
}
.online{fill:#2ecc71;}
.label{
    fill:#2c3e50;
    text-anchor:middle;
    font-family:'Segoe UI',sans-serif;
}
</style>
</head>
<body>
<div class="container">
<h1 class="main-title">🏠 Home Layout</h1>
<p class="subtitle">Apartment Environmental Monitoring</p>
<a href="./index.html" class="back-btn">← Dashboard</a>

<div class="layout-card">
<svg viewBox="0 0 1000 1400" xmlns="http://www.w3.org/2000/svg">

<polygon id="livingRoom" class="room online"
points="420,300 930,300 930,1160 420,1160 420,980 360,980 360,420 420,420"/>

<polygon id="bedroom" class="room"
points="70,420 360,420 360,980 420,980 420,1160 70,1160"/>

<polygon id="bathroom" class="room"
points="360,60 680,60 680,290 360,290"/>

<polygon id="entrance" class="room"
points="700,60 930,60 930,290 700,290"/>

<polygon id="kitchen" class="room"
points="420,300 700,300 700,520 420,520"/>

<polygon id="balcony" class="room"
points="70,1180 390,1180 390,1380 70,1380"/>

<text x="670" y="520" class="label" style="font-size:44px;font-weight:700;">Living Room</text>
<text id="livingTemp" x="670" y="700" class="label" style="font-size:110px;font-weight:700;">--</text>
<text id="livingHum" x="670" y="810" class="label" style="font-size:46px;">--</text>

<text x="210" y="780" class="label" style="font-size:42px;font-weight:700;">Bedroom</text>
<text x="520" y="190" class="label" style="font-size:32px;font-weight:700;">Bathroom</text>
<text x="815" y="190" class="label" style="font-size:32px;font-weight:700;">Entrance</text>
<text x="560" y="430" class="label" style="font-size:34px;font-weight:700;">Kitchen</text>
<text x="230" y="1295" class="label" style="font-size:34px;font-weight:700;">Balcony</text>

</svg>
</div>
</div>

<script>
const apiUrl = "https://bms-api.reziot.xyz/latest";

async function loadData(){
    try{
        const response = await fetch(apiUrl);
        const data = await response.json();

        document.getElementById("livingTemp").textContent =
            Number(data.temperature).toFixed(1) + "°C";

        document.getElementById("livingHum").textContent =
            Number(data.humidity).toFixed(1) + "% RH";
    }
    catch(error){
        console.error(error);
    }
}

loadData();
setInterval(loadData,15000);
</script>
</body>
</html>

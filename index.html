<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reziot Weather Station</title>

    <style>

        body {

            font-family:
                'Segoe UI',
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #eef2f7,
                    #dbe7f1
                );

            margin: 0;

            padding: 40px 20px;

            text-align: center;
        }

        .container {

            max-width: 1200px;

            margin: auto;
        }

        .main-title {

            font-size: 3rem;

            color: #2c3e50;

            margin-bottom: 10px;
        }

        .subtitle {

            color: #7f8c8d;

            margin-bottom: 40px;

            font-size: 1.1rem;
        }

        .cards-wrapper {

            display: flex;

            flex-wrap: wrap;

            justify-content: center;

            gap: 25px;
        }

        .card {

            background: white;

            padding: 35px;

            border-radius: 24px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);

            min-width: 260px;

            transition: 0.3s ease;
        }

        .card:hover {

            transform: translateY(-5px);
        }

        .temperature-card {

            border-top: 6px solid #2ecc71;
        }

        .humidity-card {

            border-top: 6px solid #3498db;
        }

        .pressure-card {

            border-top: 6px solid #e67e22;
        }

        h2 {

            color: #2c3e50;

            margin-top: 0;
        }

        .value {

            font-size: 3rem;

            font-weight: bold;

            margin: 20px 0;
        }

        .temperature-value {

            color: #2ecc71;
        }

        .humidity-value {

            color: #3498db;
        }

        .pressure-value {

            color: #e67e22;
        }

        .status {

            font-size: 0.9rem;

            color: #7f8c8d;

            background: #f1f3f5;

            padding: 10px 15px;

            border-radius: 20px;

            display: inline-block;
        }

        .nav-buttons {

            margin-top: 50px;

            display: flex;

            justify-content: center;

            gap: 20px;

            flex-wrap: wrap;
        }

        .nav-btn {

            text-decoration: none;

            padding: 14px 28px;

            border-radius: 12px;

            font-weight: bold;

            color: white;

            background: #2c3e50;

            transition: 0.2s ease;

            box-shadow:
                0 5px 15px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {

            transform: translateY(-2px);

            background: #34495e;
        }

        .grafana-btn {

            background: #e67e22;
        }

        .grafana-btn:hover {

            background: #d35400;
        }

        @media (max-width: 768px) {

            .main-title {

                font-size: 2.2rem;
            }

            .card {

                width: 100%;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <h1 class="main-title">
            🌦️ Reziot Weather Station
        </h1>

        <p class="subtitle">
            Live Environmental Monitoring Dashboard
        </p>

        <!-- SENSOR CARDS -->

        <div class="cards-wrapper">

            <!-- TEMPERATURE -->

            <div class="card temperature-card">

                <h2>🌡️ Temperature</h2>

                <div class="value temperature-value"
                     id="sensor-data">
                    Loading...
                </div>

                <div class="status"
                     id="timestamp">
                    Connecting to server...
                </div>

            </div>

            <!-- HUMIDITY -->

            <div class="card humidity-card">

                <h2>💧 Humidity</h2>

                <div class="value humidity-value"
                     id="humidity-data">
                    Loading...
                </div>

                <div class="status"
                     id="humidity-timestamp">
                    Connecting to server...
                </div>

            </div>

            <!-- PRESSURE -->

            <div class="card pressure-card">

                <h2>🌬️ Pressure</h2>

                <div class="value pressure-value"
                     id="pressure-data">
                    Loading...
                </div>

                <div class="status"
                     id="pressure-timestamp">
                    Connecting to server...
                </div>

            </div>

        </div>

        <!-- NAVIGATION -->

        <div class="nav-buttons">

            <a href="./Bars/"
               class="nav-btn">
                📈 Charts
            </a>

            <a href="https://rezadehhaghi.grafana.net/public-dashboards/dfaecb5d0c154b94add9ce7e59b20305"
               target="_blank"
               class="nav-btn grafana-btn">
                📊 Grafana
            </a>

        </div>

    </div>

    <script>

        const apiUrl =
            "https://bms-api.reziot.xyz/latest";

        async function getLiveValue() {

            try {

                const response =
                    await fetch(apiUrl);

                const data =
                    await response.json();

                const rawTime =
                    new Date(data.created_at);

                const formattedTime =
                    rawTime.toLocaleTimeString();

                // =====================================================
                // TEMPERATURE
                // =====================================================

                document.getElementById(
                    'sensor-data'
                ).innerText =
                    data.temperature + " °C";

                document.getElementById(
                    'timestamp'
                ).innerText =
                    `Updated: ${formattedTime}`;

                // =====================================================
                // HUMIDITY
                // =====================================================

                document.getElementById(
                    'humidity-data'
                ).innerText =
                    data.humidity + " %";

                document.getElementById(
                    'humidity-timestamp'
                ).innerText =
                    `Updated: ${formattedTime}`;

                // =====================================================
                // PRESSURE
                // =====================================================

                document.getElementById(
                    'pressure-data'
                ).innerText =
                    data.pressure + " hPa";

                document.getElementById(
                    'pressure-timestamp'
                ).innerText =
                    `Updated: ${formattedTime}`;

            }

            catch (error) {

                console.error(error);

                document.getElementById(
                    'sensor-data'
                ).innerText = "--";

                document.getElementById(
                    'humidity-data'
                ).innerText = "--";

                document.getElementById(
                    'pressure-data'
                ).innerText = "--";
            }
        }

        // Initial load
        getLiveValue();

        // Refresh every 15 seconds
        setInterval(
            getLiveValue,
            15000
        );

    </script>

</body>

</html>

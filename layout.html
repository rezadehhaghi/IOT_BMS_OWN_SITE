<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Reziot Home Layout</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(
        135deg,
        #eef2f7,
        #dbe7f1
    );
    margin:0;
    padding:15px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.main-title{
    text-align:center;
    font-size:2rem;
    color:#2c3e50;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:20px;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
}

.layout-card{
    background:white;
    border-radius:22px;
    padding:10px;
    box-shadow:
        0 8px 24px rgba(0,0,0,0.08);
}

svg{
    width:100%;
    height:auto;
    display:block;
}

.room{
    fill:#f3f4f6;
    stroke:#111827;
    stroke-width:12;
    transition:.3s;
    cursor:pointer;
}

.room:hover{
    opacity:.9;
}

.online{
    fill:#d7f3d7;
}

.offline{
    fill:#f3f4f6;
}

.label{
    fill:#1f2937;
    text-anchor:middle;
    font-family:'Segoe UI',sans-serif;
}

.legend{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
}

.legend-color{
    width:18px;
    height:18px;
    border-radius:50%;
}

@media(max-width:768px){

    .main-title{
        font-size:1.8rem;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1 class="main-title">
        🏠 Home Layout
    </h1>

    <p class="subtitle">
        Apartment Environmental Monitoring
    </p>

    <a href="./index.html"
       class="back-btn">
        ← Dashboard
    </a>

    <div class="layout-card">

        <svg viewBox="0 0 1000 1400"
             xmlns="http://www.w3.org/2000/svg">

            <!-- BATHROOM -->

            <polygon id="bathroom"
                     class="room offline"
                     points="
                     340,60
                     660,60
                     660,280
                     340,280" />

            <!-- ENTRANCE -->

            <polygon id="entrance"
                     class="room offline"
                     points="
                     680,60
                     930,60
                     930,280
                     680,280" />

            <!-- KITCHEN -->

            <polygon id="kitchen"
                     class="room offline"
                     points="
                     80,260
                     500,260
                     500,950
                     80,950" />

            <!-- LIVING ROOM -->

            <polygon id="livingRoom"
                     class="room online"
                     points="
                     500,280
                     930,280
                     930,1050
                     500,1050" />

            <!-- BALCONY -->

            <polygon id="balcony"
                     class="room offline"
                     points="
                     80,950
                     500,950
                     500,1260
                     80,1260" />

            <!-- BEDROOM -->

            <polygon id="bedroom"
                     class="room offline"
                     points="
                     500,1050
                     930,1050
                     930,1260
                     500,1260" />



            <!-- LIVING ROOM -->

            <text x="715"
                  y="460"
                  class="label"
                  style="
                      font-size:46px;
                      font-weight:700;
                  ">
                Living Room
            </text>

            <text id="livingTemp"
                  x="715"
                  y="670"
                  class="label"
                  style="
                      font-size:120px;
                      font-weight:700;
                  ">
                --
            </text>

            <text id="livingHum"
                  x="715"
                  y="790"
                  class="label"
                  style="
                      font-size:52px;
                  ">
                --
            </text>



            <!-- KITCHEN -->

            <text x="290"
                  y="620"
                  class="label"
                  style="
                      font-size:52px;
                      font-weight:700;
                  ">
                Kitchen
            </text>



            <!-- BEDROOM -->

            <text x="715"
                  y="1175"
                  class="label"
                  style="
                      font-size:40px;
                      font-weight:700;
                  ">
                Bedroom
            </text>



            <!-- BALCONY -->

            <text x="290"
                  y="1120"
                  class="label"
                  style="
                      font-size:40px;
                      font-weight:700;
                  ">
                Balcony
            </text>



            <!-- BATHROOM -->

            <text x="500"
                  y="190"
                  class="label"
                  style="
                      font-size:34px;
                      font-weight:700;
                  ">
                Bathroom
            </text>



            <!-- ENTRANCE -->

            <text x="805"
                  y="190"
                  class="label"
                  style="
                      font-size:34px;
                      font-weight:700;
                  ">
                Entrance
            </text>

        </svg>

        <div class="legend">

            <div class="legend-item">

                <div class="legend-color"
                     style="background:#d7f3d7;">
                </div>

                Sensor Online

            </div>

            <div class="legend-item">

                <div class="legend-color"
                     style="background:#f3f4f6;border:1px solid #ccc;">
                </div>

                No Sensor Installed

            </div>

        </div>

    </div>

</div>

<script>

const apiUrl =
    "https://bms-api.reziot.xyz/latest";

async function loadData(){

    try{

        const response =
            await fetch(apiUrl);

        const data =
            await response.json();

        console.log(data);

        document.getElementById(
            "livingTemp"
        ).textContent =
            Number(
                data.temperature
            ).toFixed(1) + "°C";

        document.getElementById(
            "livingHum"
        ).textContent =
            Number(
                data.humidity
            ).toFixed(1) + "% RH";

    }

    catch(error){

        console.error(
            "Layout Error:",
            error
        );

        document.getElementById(
            "livingTemp"
        ).textContent =
            "--°C";

        document.getElementById(
            "livingHum"
        ).textContent =
            "--% RH";
    }
}

loadData();

setInterval(
    loadData,
    15000
);

</script>

</body>
</html>
